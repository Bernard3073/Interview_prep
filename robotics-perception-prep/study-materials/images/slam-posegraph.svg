<svg xmlns="http://www.w3.org/2000/svg" width="660" height="320" viewBox="0 0 660 320" font-family="system-ui, sans-serif">
  <rect width="660" height="320" fill="#0f1320"/>
  <text x="20" y="28" fill="#e8ecf6" font-size="16" font-weight="bold">SLAM Pose Graph (factor graph view)</text>
  <!-- pose nodes -->
  <g fill="#4f8cff">
    <circle cx="90"  cy="120" r="16"/>
    <circle cx="220" cy="90"  r="16"/>
    <circle cx="350" cy="130" r="16"/>
    <circle cx="470" cy="100" r="16"/>
    <circle cx="560" cy="180" r="16"/>
  </g>
  <g fill="#0f1320" font-size="12" text-anchor="middle" font-weight="bold">
    <text x="90" y="124">x0</text><text x="220" y="94">x1</text><text x="350" y="134">x2</text>
    <text x="470" y="104">x3</text><text x="560" y="184">x4</text>
  </g>
  <!-- odometry edges -->
  <g stroke="#9aa6c2" stroke-width="2">
    <line x1="106" y1="120" x2="204" y2="92"/>
    <line x1="236" y1="92"  x2="334" y2="128"/>
    <line x1="366" y1="130" x2="454" y2="102"/>
    <line x1="486" y1="100" x2="544" y2="180"/>
  </g>
  <text x="150" y="80" fill="#9aa6c2" font-size="11">odometry</text>
  <!-- loop closure -->
  <path d="M560 196 C 400 300, 150 280, 90 136" fill="none" stroke="#ff8a4c" stroke-width="2.5" stroke-dasharray="6 4"/>
  <text x="300" y="300" fill="#ff8a4c" font-size="12">loop closure constraint</text>
  <!-- landmarks -->
  <g fill="#22d3a6">
    <rect x="280" y="40" width="20" height="20" rx="3"/>
    <rect x="430" y="220" width="20" height="20" rx="3"/>
  </g>
  <text x="305" y="55" fill="#22d3a6" font-size="11">landmark</text>
  <g stroke="#22d3a6" stroke-width="1.5" stroke-dasharray="3 3">
    <line x1="220" y1="90" x2="288" y2="58"/>
    <line x1="350" y1="130" x2="288" y2="58"/>
    <line x1="470" y1="100" x2="438" y2="222"/>
  </g>
  <text x="20" y="312" fill="#9aa6c2" font-size="12">Minimize Σ ‖ẑ − h(xᵢ,xⱼ)‖²_Σ  over all poses/landmarks (back-end optimization)</text>
</svg>
