<svg xmlns="http://www.w3.org/2000/svg" width="660" height="340" viewBox="0 0 660 340" font-family="system-ui, sans-serif">
  <rect width="660" height="340" fill="#0f1320"/>
  <text x="20" y="28" fill="#e8ecf6" font-size="16" font-weight="bold">Epipolar Geometry</text>
  <!-- 3D point -->
  <circle cx="330" cy="70" r="6" fill="#ff8a4c"/>
  <text x="340" y="66" fill="#ff8a4c" font-size="13">X</text>
  <!-- two camera centers -->
  <circle cx="120" cy="250" r="6" fill="#22d3a6"/>
  <text x="80" y="278" fill="#22d3a6" font-size="12">C (left)</text>
  <circle cx="540" cy="250" r="6" fill="#22d3a6"/>
  <text x="510" y="278" fill="#22d3a6" font-size="12">C' (right)</text>
  <!-- baseline -->
  <line x1="120" y1="250" x2="540" y2="250" stroke="#2b3350" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="300" y="270" fill="#9aa6c2" font-size="12">baseline</text>
  <!-- rays to X -->
  <line x1="120" y1="250" x2="330" y2="70" stroke="#ff8a4c" stroke-width="1.5"/>
  <line x1="540" y1="250" x2="330" y2="70" stroke="#ff8a4c" stroke-width="1.5"/>
  <!-- image planes -->
  <line x1="170" y1="140" x2="250" y2="200" stroke="#4f8cff" stroke-width="2"/>
  <line x1="410" y1="200" x2="490" y2="140" stroke="#4f8cff" stroke-width="2"/>
  <!-- image points -->
  <circle cx="205" cy="170" r="5" fill="#e8ecf6"/>
  <text x="160" y="165" fill="#e8ecf6" font-size="12">x</text>
  <circle cx="455" cy="170" r="5" fill="#e8ecf6"/>
  <text x="460" y="165" fill="#e8ecf6" font-size="12">x'</text>
  <!-- epipolar line on right image (illustrative) -->
  <line x1="410" y1="195" x2="490" y2="148" stroke="#c084fc" stroke-width="3" opacity="0.5"/>
  <text x="430" y="225" fill="#c084fc" font-size="12">epipolar line l'</text>
  <text x="20" y="320" fill="#9aa6c2" font-size="13">Constraint:  x'ᵀ F x = 0      (F = fundamental, E = K'ᵀ F K = [t]ₓ R)</text>
</svg>
