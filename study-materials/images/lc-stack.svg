<svg xmlns="http://www.w3.org/2000/svg" width="640" height="280" viewBox="0 0 640 280" font-family="system-ui, sans-serif">
  <rect width="640" height="280" fill="#0f1320"/>
  <text x="20" y="30" fill="#e8ecf6" font-size="16" font-weight="bold">Stack — LIFO; push / pop / peek all O(1)</text>

  <!-- ===== left: plain LIFO stack ===== -->
  <text x="90" y="66" fill="#9aa6c2" font-size="13" text-anchor="middle">push / pop at the top only</text>
  <g font-size="15" text-anchor="middle">
    <rect x="50" y="80"  width="80" height="34" fill="#232b44" stroke="#22d3a6" stroke-width="2"/><text x="90" y="102" fill="#e8ecf6">7</text>
    <rect x="50" y="114" width="80" height="34" fill="#1c2236" stroke="#2b3350"/><text x="90" y="136" fill="#e8ecf6">5</text>
    <rect x="50" y="148" width="80" height="34" fill="#1c2236" stroke="#2b3350"/><text x="90" y="170" fill="#e8ecf6">8</text>
    <rect x="50" y="182" width="80" height="34" fill="#1c2236" stroke="#2b3350"/><text x="90" y="204" fill="#e8ecf6">3</text>
  </g>
  <text x="145" y="101" fill="#22d3a6" font-size="12" text-anchor="start">← top</text>
  <!-- push/pop arrows -->
  <g stroke="#22d3a6" stroke-width="2" fill="none">
    <path d="M90 74 v-14" marker-end="url(#up)"/>
  </g>
  <text x="90" y="230" fill="#9aa6c2" font-size="12" text-anchor="middle">bottom</text>
  <text x="90" y="248" fill="#9aa6c2" font-size="12" text-anchor="middle">a=[]; a.append(x); a.pop(); a[-1]</text>

  <!-- ===== right: monotonic (decreasing) stack ===== -->
  <text x="420" y="66" fill="#e8ecf6" font-size="13" font-weight="bold" text-anchor="middle">Monotonic (decreasing) stack → next greater element</text>
  <text x="420" y="86" fill="#9aa6c2" font-size="12" text-anchor="middle">scan values; pop everything smaller than the incoming one</text>

  <!-- input sequence -->
  <g font-size="15" text-anchor="middle">
    <rect x="300" y="104" width="40" height="34" fill="#1c2236" stroke="#2b3350"/><text x="320" y="126" fill="#e8ecf6">73</text>
    <rect x="340" y="104" width="40" height="34" fill="#1c2236" stroke="#2b3350"/><text x="360" y="126" fill="#e8ecf6">74</text>
    <rect x="380" y="104" width="40" height="34" fill="#1c2236" stroke="#2b3350"/><text x="400" y="126" fill="#e8ecf6">75</text>
    <rect x="420" y="104" width="40" height="34" fill="#1c2236" stroke="#2b3350"/><text x="440" y="126" fill="#e8ecf6">71</text>
    <rect x="460" y="104" width="40" height="34" fill="#1c2236" stroke="#2b3350"/><text x="480" y="126" fill="#e8ecf6">69</text>
    <rect x="500" y="104" width="40" height="34" fill="#232b44" stroke="#22d3a6" stroke-width="2"/><text x="520" y="126" fill="#e8ecf6">72</text>
    <rect x="540" y="104" width="40" height="34" fill="#1c2236" stroke="#2b3350"/><text x="560" y="126" fill="#e8ecf6">76</text>
  </g>
  <text x="520" y="152" fill="#22d3a6" font-size="12" text-anchor="middle">incoming = 72</text>

  <!-- popped-off view: 69 and 71 resolved by 72 -->
  <text x="440" y="192" fill="#9aa6c2" font-size="12" text-anchor="middle">72 &gt; 69 and 72 &gt; 71 → pop both;</text>
  <text x="440" y="210" fill="#9aa6c2" font-size="12" text-anchor="middle">each resolves its “days until warmer”.</text>
  <g font-size="14" text-anchor="middle">
    <rect x="360" y="222" width="44" height="30" fill="#1c2236" stroke="#e0564a"/><text x="382" y="242" fill="#e8ecf6">69</text>
    <rect x="404" y="222" width="44" height="30" fill="#1c2236" stroke="#e0564a"/><text x="426" y="242" fill="#e8ecf6">71</text>
  </g>
  <text x="470" y="242" fill="#9aa6c2" font-size="12" text-anchor="start">popped</text>

  <text x="420" y="272" fill="#22d3a6" font-size="12" text-anchor="middle">each index pushed &amp; popped once → O(n)</text>

  <defs>
    <marker id="up" markerWidth="9" markerHeight="9" refX="4.5" refY="7" orient="auto">
      <path d="M4.5 0 L9 8 L0 8 Z" fill="#22d3a6"/>
    </marker>
  </defs>
</svg>
