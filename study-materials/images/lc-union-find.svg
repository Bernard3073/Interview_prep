<svg xmlns="http://www.w3.org/2000/svg" width="640" height="280" viewBox="0 0 640 280" font-family="system-ui, sans-serif">
  <rect width="640" height="280" fill="#0f1320"/>
  <text x="20" y="30" fill="#e8ecf6" font-size="16" font-weight="bold">Union-Find — disjoint sets as parent-pointer forests</text>

  <!-- before: two trees -->
  <text x="150" y="64" fill="#9aa6c2" font-size="13" text-anchor="middle">before union(3, 4)</text>
  <g stroke="#2b3350" stroke-width="2">
    <line x1="100" y1="150" x2="70"  y2="210" marker-end="url(#uf)"/>
    <line x1="100" y1="150" x2="130" y2="210" marker-end="url(#uf)"/>
    <line x1="230" y1="150" x2="230" y2="210" marker-end="url(#uf)"/>
  </g>
  <g font-size="14" text-anchor="middle">
    <circle cx="100" cy="130" r="18" fill="#232b44" stroke="#4f8cff" stroke-width="2"/><text x="100" y="135" fill="#e8ecf6">1</text>
    <circle cx="70"  cy="222" r="18" fill="#232b44" stroke="#2b3350"/><text x="70"  y="227" fill="#e8ecf6">2</text>
    <circle cx="130" cy="222" r="18" fill="#232b44" stroke="#2b3350"/><text x="130" y="227" fill="#e8ecf6">3</text>
    <circle cx="230" cy="130" r="18" fill="#232b44" stroke="#22d3a6" stroke-width="2"/><text x="230" y="135" fill="#e8ecf6">4</text>
    <circle cx="230" cy="222" r="18" fill="#232b44" stroke="#2b3350"/><text x="230" y="227" fill="#e8ecf6">5</text>
  </g>
  <text x="100" y="110" fill="#4f8cff" font-size="11" text-anchor="middle">root</text>
  <text x="230" y="110" fill="#22d3a6" font-size="11" text-anchor="middle">root</text>

  <!-- arrow -->
  <text x="330" y="185" fill="#9aa6c2" font-size="26">→</text>

  <!-- after: merged -->
  <text x="500" y="64" fill="#9aa6c2" font-size="13" text-anchor="middle">after: attach one root to the other</text>
  <g stroke="#2b3350" stroke-width="2">
    <line x1="470" y1="100" x2="440" y2="155" marker-end="url(#uf)"/>
    <line x1="470" y1="100" x2="500" y2="155" marker-end="url(#uf)"/>
    <line x1="440" y1="175" x2="410" y2="225" marker-end="url(#uf)"/>
    <line x1="440" y1="175" x2="470" y2="225" marker-end="url(#uf)"/>
    <line x1="500" y1="175" x2="500" y2="225" marker-end="url(#uf)"/>
  </g>
  <g font-size="14" text-anchor="middle">
    <circle cx="470" cy="80"  r="18" fill="#232b44" stroke="#4f8cff" stroke-width="2"/><text x="470" y="85" fill="#e8ecf6">1</text>
    <circle cx="440" cy="167" r="18" fill="#232b44" stroke="#2b3350"/><text x="440" y="172" fill="#e8ecf6">3</text>
    <circle cx="500" cy="167" r="18" fill="#232b44" stroke="#2b3350"/><text x="500" y="172" fill="#e8ecf6">2</text>
    <circle cx="410" cy="237" r="18" fill="#232b44" stroke="#2b3350"/><text x="410" y="242" fill="#e8ecf6">4</text>
    <circle cx="470" cy="237" r="18" fill="#232b44" stroke="#2b3350"/><text x="470" y="242" fill="#e8ecf6">5</text>
  </g>
  <text x="470" y="60" fill="#4f8cff" font-size="11" text-anchor="middle">single root</text>

  <defs>
    <marker id="uf" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#9aa6c2"/>
    </marker>
  </defs>

  <text x="320" y="270" fill="#9aa6c2" font-size="12" text-anchor="middle">find(x) follows parents to the root; same root = same set. Path compression + union-by-rank → ~O(α(n)).</text>
</svg>
