<svg xmlns="http://www.w3.org/2000/svg" width="640" height="300" viewBox="0 0 640 300" font-family="system-ui, sans-serif">
  <rect width="640" height="300" fill="#0f1320"/>
  <text x="20" y="30" fill="#e8ecf6" font-size="16" font-weight="bold">BFS vs DFS — same tree, different visit order</text>

  <!-- ===== BFS (left) ===== -->
  <text x="150" y="62" fill="#4f8cff" font-size="14" font-weight="bold" text-anchor="middle">BFS — queue, level by level</text>
  <!-- edges -->
  <g stroke="#2b3350" stroke-width="2">
    <line x1="150" y1="90" x2="100" y2="150"/>
    <line x1="150" y1="90" x2="200" y2="150"/>
    <line x1="100" y1="150" x2="70"  y2="210"/>
    <line x1="100" y1="150" x2="130" y2="210"/>
    <line x1="200" y1="150" x2="170" y2="210"/>
    <line x1="200" y1="150" x2="230" y2="210"/>
  </g>
  <!-- nodes with visit order -->
  <g font-size="14" text-anchor="middle">
    <circle cx="150" cy="90"  r="18" fill="#232b44" stroke="#4f8cff" stroke-width="2"/><text x="150" y="95" fill="#e8ecf6">1</text>
    <circle cx="100" cy="150" r="18" fill="#232b44" stroke="#4f8cff" stroke-width="2"/><text x="100" y="155" fill="#e8ecf6">2</text>
    <circle cx="200" cy="150" r="18" fill="#232b44" stroke="#4f8cff" stroke-width="2"/><text x="200" y="155" fill="#e8ecf6">3</text>
    <circle cx="70"  cy="210" r="18" fill="#232b44" stroke="#4f8cff" stroke-width="2"/><text x="70"  y="215" fill="#e8ecf6">4</text>
    <circle cx="130" cy="210" r="18" fill="#232b44" stroke="#4f8cff" stroke-width="2"/><text x="130" y="215" fill="#e8ecf6">5</text>
    <circle cx="170" cy="210" r="18" fill="#232b44" stroke="#4f8cff" stroke-width="2"/><text x="170" y="215" fill="#e8ecf6">6</text>
    <circle cx="230" cy="210" r="18" fill="#232b44" stroke="#4f8cff" stroke-width="2"/><text x="230" y="215" fill="#e8ecf6">7</text>
  </g>
  <text x="150" y="258" fill="#9aa6c2" font-size="12" text-anchor="middle">first time reached = shortest</text>
  <text x="150" y="276" fill="#9aa6c2" font-size="12" text-anchor="middle">path (fewest edges)</text>

  <!-- divider -->
  <line x1="320" y1="80" x2="320" y2="270" stroke="#2b3350" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- ===== DFS (right) ===== -->
  <text x="490" y="62" fill="#22d3a6" font-size="14" font-weight="bold" text-anchor="middle">DFS — stack/recursion, deep first</text>
  <g stroke="#2b3350" stroke-width="2">
    <line x1="490" y1="90" x2="440" y2="150"/>
    <line x1="490" y1="90" x2="540" y2="150"/>
    <line x1="440" y1="150" x2="410" y2="210"/>
    <line x1="440" y1="150" x2="470" y2="210"/>
    <line x1="540" y1="150" x2="510" y2="210"/>
    <line x1="540" y1="150" x2="570" y2="210"/>
  </g>
  <g font-size="14" text-anchor="middle">
    <circle cx="490" cy="90"  r="18" fill="#232b44" stroke="#22d3a6" stroke-width="2"/><text x="490" y="95" fill="#e8ecf6">1</text>
    <circle cx="440" cy="150" r="18" fill="#232b44" stroke="#22d3a6" stroke-width="2"/><text x="440" y="155" fill="#e8ecf6">2</text>
    <circle cx="540" cy="150" r="18" fill="#232b44" stroke="#22d3a6" stroke-width="2"/><text x="540" y="155" fill="#e8ecf6">5</text>
    <circle cx="410" cy="210" r="18" fill="#232b44" stroke="#22d3a6" stroke-width="2"/><text x="410" y="215" fill="#e8ecf6">3</text>
    <circle cx="470" cy="210" r="18" fill="#232b44" stroke="#22d3a6" stroke-width="2"/><text x="470" y="215" fill="#e8ecf6">4</text>
    <circle cx="510" cy="210" r="18" fill="#232b44" stroke="#22d3a6" stroke-width="2"/><text x="510" y="215" fill="#e8ecf6">6</text>
    <circle cx="570" cy="210" r="18" fill="#232b44" stroke="#22d3a6" stroke-width="2"/><text x="570" y="215" fill="#e8ecf6">7</text>
  </g>
  <text x="490" y="258" fill="#9aa6c2" font-size="12" text-anchor="middle">explores a whole branch</text>
  <text x="490" y="276" fill="#9aa6c2" font-size="12" text-anchor="middle">before backtracking</text>
</svg>
