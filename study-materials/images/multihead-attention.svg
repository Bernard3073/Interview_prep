<svg xmlns="http://www.w3.org/2000/svg" width="760" height="360" viewBox="0 0 760 360" font-family="system-ui, sans-serif">
  <rect width="760" height="360" fill="#0f1320"/>
  <text x="20" y="30" fill="#e8ecf6" font-size="16" font-weight="bold">Multi-Head Attention</text>
  <text x="20" y="52" fill="#9aa6c2" font-size="12">Project into h heads, attend in parallel, concat, project back.</text>

  <!-- input -->
  <rect x="40" y="160" width="110" height="40" rx="8" fill="#1c2236" stroke="#4f8cff" stroke-width="2"/>
  <text x="95" y="178" fill="#e8ecf6" font-size="12" text-anchor="middle">Q, K, V</text>
  <text x="95" y="193" fill="#9aa6c2" font-size="10" text-anchor="middle">d_model</text>

  <!-- linear split -->
  <rect x="180" y="150" width="80" height="60" rx="8" fill="#1c2236" stroke="#e8ecf6" stroke-width="1.5"/>
  <text x="220" y="176" fill="#e8ecf6" font-size="11" text-anchor="middle">Linear</text>
  <text x="220" y="192" fill="#9aa6c2" font-size="10" text-anchor="middle">split → h</text>
  <line x1="150" y1="180" x2="178" y2="180" stroke="#e8ecf6" stroke-width="2" marker-end="url(#a)"/>

  <!-- heads -->
  <rect x="300" y="80" width="150" height="40" rx="8" fill="#1c2236" stroke="#ff8a4c" stroke-width="2"/>
  <text x="375" y="105" fill="#ff8a4c" font-size="12" text-anchor="middle">head 1: Attn(Q₁,K₁,V₁)</text>
  <rect x="300" y="160" width="150" height="40" rx="8" fill="#1c2236" stroke="#ff8a4c" stroke-width="2"/>
  <text x="375" y="185" fill="#ff8a4c" font-size="12" text-anchor="middle">head 2: Attn(Q₂,K₂,V₂)</text>
  <text x="375" y="228" fill="#9aa6c2" font-size="16" text-anchor="middle">⋮</text>
  <rect x="300" y="240" width="150" height="40" rx="8" fill="#1c2236" stroke="#ff8a4c" stroke-width="2"/>
  <text x="375" y="265" fill="#ff8a4c" font-size="12" text-anchor="middle">head h: Attn(Q_h,K_h,V_h)</text>

  <line x1="260" y1="175" x2="298" y2="100" stroke="#e8ecf6" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="260" y1="180" x2="298" y2="180" stroke="#e8ecf6" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="260" y1="185" x2="298" y2="260" stroke="#e8ecf6" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="250" y="115" fill="#9aa6c2" font-size="10">each head: d_model / h dims</text>

  <!-- concat -->
  <rect x="490" y="150" width="90" height="60" rx="8" fill="#1c2236" stroke="#22d3a6" stroke-width="2"/>
  <text x="535" y="176" fill="#22d3a6" font-size="12" text-anchor="middle">Concat</text>
  <text x="535" y="192" fill="#9aa6c2" font-size="10" text-anchor="middle">heads</text>
  <line x1="450" y1="100" x2="488" y2="170" stroke="#22d3a6" stroke-width="1.5" marker-end="url(#b)"/>
  <line x1="450" y1="180" x2="488" y2="180" stroke="#22d3a6" stroke-width="1.5" marker-end="url(#b)"/>
  <line x1="450" y1="260" x2="488" y2="190" stroke="#22d3a6" stroke-width="1.5" marker-end="url(#b)"/>

  <!-- output linear -->
  <rect x="610" y="150" width="110" height="60" rx="8" fill="#1c2236" stroke="#e8ecf6" stroke-width="1.5"/>
  <text x="665" y="176" fill="#e8ecf6" font-size="12" text-anchor="middle">Linear Wᴼ</text>
  <text x="665" y="192" fill="#9aa6c2" font-size="10" text-anchor="middle">→ d_model</text>
  <line x1="580" y1="180" x2="608" y2="180" stroke="#e8ecf6" stroke-width="2" marker-end="url(#a)"/>

  <text x="40" y="320" fill="#9aa6c2" font-size="12">Why multiple heads? Each head can specialize — one tracks nearby tokens, another</text>
  <text x="40" y="338" fill="#9aa6c2" font-size="12">long-range or a different relation — giving the model several "views" of the sequence.</text>

  <defs>
    <marker id="a" markerWidth="8" markerHeight="8" refX="5.5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#e8ecf6"/></marker>
    <marker id="b" markerWidth="8" markerHeight="8" refX="5.5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#22d3a6"/></marker>
  </defs>
</svg>
