<svg xmlns="http://www.w3.org/2000/svg" width="680" height="340" viewBox="0 0 680 340" font-family="system-ui, sans-serif">
  <rect width="680" height="340" fill="#0f1320"/>
  <text x="20" y="28" fill="#e8ecf6" font-size="16" font-weight="bold">Smart Pointers &amp; Ownership (the heap object lives until its owners are gone)</text>

  <!-- heap object -->
  <rect x="430" y="150" width="170" height="64" rx="10" fill="#1c2236" stroke="#ff8a4c" stroke-width="2"/>
  <text x="515" y="178" fill="#ff8a4c" font-size="13" text-anchor="middle" font-weight="bold">heap object</text>
  <text x="515" y="198" fill="#9aa6c2" font-size="11" text-anchor="middle">(new / make_*)</text>

  <!-- unique_ptr -->
  <rect x="40" y="60" width="180" height="56" rx="10" fill="#1c2236" stroke="#4f8cff" stroke-width="2"/>
  <text x="130" y="84" fill="#4f8cff" font-size="13" text-anchor="middle" font-weight="bold">unique_ptr</text>
  <text x="130" y="103" fill="#9aa6c2" font-size="11" text-anchor="middle">sole owner · move-only</text>
  <line x1="220" y1="88" x2="430" y2="165" stroke="#4f8cff" stroke-width="2" marker-end="url(#a)"/>
  <text x="300" y="120" fill="#4f8cff" font-size="11">owns (0 overhead)</text>

  <!-- shared_ptr x2 -->
  <rect x="40" y="150" width="180" height="56" rx="10" fill="#1c2236" stroke="#22d3a6" stroke-width="2"/>
  <text x="130" y="174" fill="#22d3a6" font-size="13" text-anchor="middle" font-weight="bold">shared_ptr</text>
  <text x="130" y="193" fill="#9aa6c2" font-size="11" text-anchor="middle">ref-counted (use=2)</text>
  <rect x="40" y="218" width="180" height="44" rx="10" fill="#1c2236" stroke="#22d3a6" stroke-width="2"/>
  <text x="130" y="245" fill="#22d3a6" font-size="13" text-anchor="middle" font-weight="bold">shared_ptr (copy)</text>
  <line x1="220" y1="178" x2="430" y2="182" stroke="#22d3a6" stroke-width="2" marker-end="url(#b)"/>
  <line x1="220" y1="240" x2="430" y2="200" stroke="#22d3a6" stroke-width="2" marker-end="url(#b)"/>

  <!-- weak_ptr -->
  <rect x="40" y="278" width="180" height="44" rx="10" fill="#1c2236" stroke="#c084fc" stroke-width="2"/>
  <text x="130" y="305" fill="#c084fc" font-size="13" text-anchor="middle" font-weight="bold">weak_ptr</text>
  <line x1="220" y1="300" x2="430" y2="210" stroke="#c084fc" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#c)"/>
  <text x="250" y="285" fill="#c084fc" font-size="11">observes (no count) → breaks cycles</text>

  <text x="430" y="245" fill="#9aa6c2" font-size="11">control block: strong=2, weak=1</text>
  <text x="430" y="262" fill="#9aa6c2" font-size="11">freed when strong count → 0</text>

  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#4f8cff"/></marker>
    <marker id="b" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#22d3a6"/></marker>
    <marker id="c" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#c084fc"/></marker>
  </defs>
</svg>
