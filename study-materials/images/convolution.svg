<svg xmlns="http://www.w3.org/2000/svg" width="660" height="300" viewBox="0 0 660 300" font-family="system-ui, sans-serif">
  <rect width="660" height="300" fill="#0f1320"/>
  <text x="20" y="28" fill="#e8ecf6" font-size="16" font-weight="bold">2D Convolution (3×3 kernel)</text>
  <!-- input grid -->
  <g>
    <text x="90" y="60" fill="#9aa6c2" font-size="12">input image</text>
    <g stroke="#2b3350" fill="#1c2236">
      <!-- 5x5 -->
      <g id="grid"></g>
    </g>
  </g>
  <!-- draw 5x5 -->
  <g stroke="#2b3350">
    <!-- rows -->
    <rect x="40" y="70"  width="180" height="180" fill="#1c2236"/>
    <line x1="76"  y1="70" x2="76"  y2="250" stroke="#2b3350"/>
    <line x1="112" y1="70" x2="112" y2="250" stroke="#2b3350"/>
    <line x1="148" y1="70" x2="148" y2="250" stroke="#2b3350"/>
    <line x1="184" y1="70" x2="184" y2="250" stroke="#2b3350"/>
    <line x1="40" y1="106" x2="220" y2="106" stroke="#2b3350"/>
    <line x1="40" y1="142" x2="220" y2="142" stroke="#2b3350"/>
    <line x1="40" y1="178" x2="220" y2="178" stroke="#2b3350"/>
    <line x1="40" y1="214" x2="220" y2="214" stroke="#2b3350"/>
  </g>
  <!-- highlight 3x3 window -->
  <rect x="40" y="70" width="108" height="108" fill="none" stroke="#4f8cff" stroke-width="3"/>
  <text x="50" y="62" fill="#4f8cff" font-size="11">3×3 window</text>
  <!-- kernel -->
  <text x="300" y="60" fill="#9aa6c2" font-size="12">kernel (Sobel-x)</text>
  <g font-size="14" fill="#e8ecf6" text-anchor="middle">
    <rect x="300" y="70" width="120" height="120" fill="#1c2236" stroke="#c084fc" stroke-width="2"/>
    <line x1="340" y1="70" x2="340" y2="190" stroke="#2b3350"/>
    <line x1="380" y1="70" x2="380" y2="190" stroke="#2b3350"/>
    <line x1="300" y1="110" x2="420" y2="110" stroke="#2b3350"/>
    <line x1="300" y1="150" x2="420" y2="150" stroke="#2b3350"/>
    <text x="320" y="95">-1</text><text x="360" y="95">0</text><text x="400" y="95">+1</text>
    <text x="320" y="135">-2</text><text x="360" y="135">0</text><text x="400" y="135">+2</text>
    <text x="320" y="175">-1</text><text x="360" y="175">0</text><text x="400" y="175">+1</text>
  </g>
  <text x="445" y="135" fill="#e8ecf6" font-size="22">→</text>
  <!-- output pixel -->
  <rect x="490" y="100" width="60" height="60" fill="#22d3a6" opacity="0.85"/>
  <text x="500" y="90" fill="#22d3a6" font-size="11">output px</text>
  <text x="20" y="285" fill="#9aa6c2" font-size="13">out(i,j) = Σ_{m,n} kernel(m,n) · img(i+m, j+n)   — slide the window over every pixel</text>
</svg>
