<svg xmlns="http://www.w3.org/2000/svg" width="640" height="320" viewBox="0 0 640 320" font-family="system-ui, sans-serif">
  <rect width="640" height="320" fill="#0f1320"/>
  <text x="20" y="30" fill="#e8ecf6" font-size="16" font-weight="bold">Backtracking — decision tree for subsets of {1, 2, 3}</text>

  <!-- edges with include/exclude labels -->
  <g stroke="#2b3350" stroke-width="2">
    <line x1="320" y1="70" x2="180" y2="130"/>
    <line x1="320" y1="70" x2="460" y2="130"/>
    <line x1="180" y1="150" x2="110" y2="200"/>
    <line x1="180" y1="150" x2="250" y2="200"/>
    <line x1="460" y1="150" x2="390" y2="200"/>
    <line x1="460" y1="150" x2="530" y2="200"/>
    <line x1="110" y1="220" x2="80"  y2="262"/>
    <line x1="110" y1="220" x2="140" y2="262"/>
    <line x1="250" y1="220" x2="220" y2="262"/>
    <line x1="250" y1="220" x2="280" y2="262"/>
    <line x1="390" y1="220" x2="360" y2="262"/>
    <line x1="390" y1="220" x2="420" y2="262"/>
    <line x1="530" y1="220" x2="500" y2="262"/>
    <line x1="530" y1="220" x2="560" y2="262"/>
  </g>

  <!-- edge labels (top split) -->
  <text x="232" y="104" fill="#22d3a6" font-size="11">take 1</text>
  <text x="392" y="104" fill="#ff8a4c" font-size="11">skip 1</text>

  <!-- root -->
  <g font-size="13" text-anchor="middle">
    <circle cx="320" cy="60" r="16" fill="#232b44" stroke="#4f8cff" stroke-width="2"/><text x="320" y="64" fill="#e8ecf6">{}</text>
    <!-- level: decide 2 -->
    <circle cx="180" cy="140" r="16" fill="#232b44" stroke="#2b3350"/><text x="180" y="144" fill="#e8ecf6">1</text>
    <circle cx="460" cy="140" r="16" fill="#232b44" stroke="#2b3350"/><text x="460" y="144" fill="#e8ecf6">·</text>
    <!-- decide 3 -->
    <circle cx="110" cy="210" r="16" fill="#232b44" stroke="#2b3350"/><text x="110" y="214" fill="#e8ecf6">12</text>
    <circle cx="250" cy="210" r="16" fill="#232b44" stroke="#2b3350"/><text x="250" y="214" fill="#e8ecf6">1</text>
    <circle cx="390" cy="210" r="16" fill="#232b44" stroke="#2b3350"/><text x="390" y="214" fill="#e8ecf6">2</text>
    <circle cx="530" cy="210" r="16" fill="#232b44" stroke="#2b3350"/><text x="530" y="214" fill="#e8ecf6">·</text>
  </g>

  <!-- leaves -->
  <g font-size="12" text-anchor="middle">
    <rect x="58"  y="262" width="44" height="28" fill="#1c2236" stroke="#22d3a6"/><text x="80"  y="281" fill="#e8ecf6">123</text>
    <rect x="118" y="262" width="44" height="28" fill="#1c2236" stroke="#22d3a6"/><text x="140" y="281" fill="#e8ecf6">12</text>
    <rect x="198" y="262" width="44" height="28" fill="#1c2236" stroke="#22d3a6"/><text x="220" y="281" fill="#e8ecf6">13</text>
    <rect x="258" y="262" width="44" height="28" fill="#1c2236" stroke="#22d3a6"/><text x="280" y="281" fill="#e8ecf6">1</text>
    <rect x="338" y="262" width="44" height="28" fill="#1c2236" stroke="#22d3a6"/><text x="360" y="281" fill="#e8ecf6">23</text>
    <rect x="398" y="262" width="44" height="28" fill="#1c2236" stroke="#22d3a6"/><text x="420" y="281" fill="#e8ecf6">2</text>
    <rect x="478" y="262" width="44" height="28" fill="#1c2236" stroke="#22d3a6"/><text x="500" y="281" fill="#e8ecf6">3</text>
    <rect x="538" y="262" width="44" height="28" fill="#1c2236" stroke="#22d3a6"/><text x="560" y="281" fill="#e8ecf6">{}</text>
  </g>

  <text x="600" y="150" fill="#9aa6c2" font-size="12" text-anchor="end">at each element: choose →</text>
  <text x="600" y="168" fill="#9aa6c2" font-size="12" text-anchor="end">recurse → un-choose.</text>
  <text x="600" y="186" fill="#9aa6c2" font-size="12" text-anchor="end">Prune branches that</text>
  <text x="600" y="204" fill="#9aa6c2" font-size="12" text-anchor="end">can't reach a goal.</text>
</svg>
