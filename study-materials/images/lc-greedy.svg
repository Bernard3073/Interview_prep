<svg xmlns="http://www.w3.org/2000/svg" width="640" height="220" viewBox="0 0 640 220" font-family="system-ui, sans-serif">
  <rect width="640" height="220" fill="#0f1320"/>
  <text x="20" y="30" fill="#e8ecf6" font-size="16" font-weight="bold">Greedy — Jump Game: track the farthest index still reachable</text>

  <!-- array of jump lengths -->
  <g font-size="16" text-anchor="middle">
    <rect x="70"  y="70" width="60" height="48" fill="#1c2236" stroke="#2b3350"/><text x="100" y="100" fill="#e8ecf6">2</text>
    <rect x="130" y="70" width="60" height="48" fill="#1c2236" stroke="#2b3350"/><text x="160" y="100" fill="#e8ecf6">3</text>
    <rect x="190" y="70" width="60" height="48" fill="#1c2236" stroke="#2b3350"/><text x="220" y="100" fill="#e8ecf6">1</text>
    <rect x="250" y="70" width="60" height="48" fill="#1c2236" stroke="#2b3350"/><text x="280" y="100" fill="#e8ecf6">1</text>
    <rect x="310" y="70" width="60" height="48" fill="#1c2236" stroke="#22d3a6" stroke-width="2"/><text x="340" y="100" fill="#e8ecf6">4</text>
  </g>
  <g font-size="12" text-anchor="middle" fill="#9aa6c2">
    <text x="100" y="60">i=0</text><text x="160" y="60">1</text><text x="220" y="60">2</text><text x="280" y="60">3</text><text x="340" y="60">4 (goal)</text>
  </g>

  <!-- reach bar -->
  <text x="70" y="150" fill="#9aa6c2" font-size="12">reach:</text>
  <line x1="100" y1="146" x2="220" y2="146" stroke="#4f8cff" stroke-width="6"/>
  <text x="160" y="138" fill="#4f8cff" font-size="11" text-anchor="middle">i=0 → reach 2</text>
  <line x1="160" y1="166" x2="340" y2="166" stroke="#22d3a6" stroke-width="6"/>
  <text x="250" y="184" fill="#22d3a6" font-size="11" text-anchor="middle">i=1 → reach 4 ✓ (covers the goal)</text>

  <text x="430" y="92" fill="#9aa6c2" font-size="12">at each i, if i &gt; reach → stuck</text>
  <text x="430" y="112" fill="#9aa6c2" font-size="12">else reach = max(reach, i + a[i])</text>
  <text x="430" y="132" fill="#9aa6c2" font-size="12">one pass, O(n), no DP needed.</text>
  <text x="320" y="208" fill="#9aa6c2" font-size="12" text-anchor="middle">Greedy works because the local choice (extend reach as far as possible) is provably safe.</text>
</svg>
