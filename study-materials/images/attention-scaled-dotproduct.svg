<svg xmlns="http://www.w3.org/2000/svg" width="760" height="290" viewBox="0 0 760 290" font-family="system-ui, sans-serif">
  <rect width="760" height="290" fill="#0f1320"/>
  <text x="20" y="30" fill="#e8ecf6" font-size="16" font-weight="bold">Scaled Dot-Product Attention</text>
  <text x="20" y="52" fill="#9aa6c2" font-size="12">Attention(Q,K,V) = softmax( Q Kᵀ / √dₖ ) V</text>

  <!-- Q K V inputs -->
  <rect x="30" y="90" width="90" height="34" rx="8" fill="#1c2236" stroke="#4f8cff" stroke-width="2"/>
  <text x="75" y="112" fill="#4f8cff" font-size="14" text-anchor="middle" font-weight="bold">Q</text>
  <rect x="30" y="138" width="90" height="34" rx="8" fill="#1c2236" stroke="#4f8cff" stroke-width="2"/>
  <text x="75" y="160" fill="#4f8cff" font-size="14" text-anchor="middle" font-weight="bold">K</text>
  <rect x="30" y="220" width="90" height="34" rx="8" fill="#1c2236" stroke="#22d3a6" stroke-width="2"/>
  <text x="75" y="242" fill="#22d3a6" font-size="14" text-anchor="middle" font-weight="bold">V</text>

  <!-- MatMul QK^T -->
  <rect x="180" y="110" width="120" height="44" rx="8" fill="#1c2236" stroke="#e8ecf6" stroke-width="1.5"/>
  <text x="240" y="130" fill="#e8ecf6" font-size="13" text-anchor="middle">MatMul</text>
  <text x="240" y="147" fill="#9aa6c2" font-size="11" text-anchor="middle">Q Kᵀ → scores</text>

  <!-- Scale -->
  <rect x="330" y="110" width="100" height="44" rx="8" fill="#1c2236" stroke="#e8ecf6" stroke-width="1.5"/>
  <text x="380" y="130" fill="#e8ecf6" font-size="13" text-anchor="middle">Scale</text>
  <text x="380" y="147" fill="#9aa6c2" font-size="11" text-anchor="middle">÷ √dₖ</text>

  <!-- Softmax -->
  <rect x="460" y="110" width="110" height="44" rx="8" fill="#1c2236" stroke="#ff8a4c" stroke-width="2"/>
  <text x="515" y="130" fill="#ff8a4c" font-size="13" text-anchor="middle" font-weight="bold">Softmax</text>
  <text x="515" y="147" fill="#9aa6c2" font-size="11" text-anchor="middle">rows → weights</text>

  <!-- MatMul *V -->
  <rect x="600" y="150" width="120" height="44" rx="8" fill="#1c2236" stroke="#e8ecf6" stroke-width="1.5"/>
  <text x="660" y="170" fill="#e8ecf6" font-size="13" text-anchor="middle">MatMul</text>
  <text x="660" y="187" fill="#9aa6c2" font-size="11" text-anchor="middle">weights · V</text>

  <!-- Output -->
  <text x="660" y="232" fill="#22d3a6" font-size="13" text-anchor="middle" font-weight="bold">Output</text>
  <text x="660" y="250" fill="#9aa6c2" font-size="11" text-anchor="middle">context vectors</text>

  <!-- arrows -->
  <line x1="120" y1="107" x2="178" y2="125" stroke="#4f8cff" stroke-width="2" marker-end="url(#a)"/>
  <line x1="120" y1="155" x2="178" y2="138" stroke="#4f8cff" stroke-width="2" marker-end="url(#a)"/>
  <line x1="300" y1="132" x2="328" y2="132" stroke="#e8ecf6" stroke-width="2" marker-end="url(#a)"/>
  <line x1="430" y1="132" x2="458" y2="132" stroke="#e8ecf6" stroke-width="2" marker-end="url(#a)"/>
  <line x1="570" y1="140" x2="598" y2="160" stroke="#ff8a4c" stroke-width="2" marker-end="url(#c)"/>
  <line x1="120" y1="237" x2="598" y2="185" stroke="#22d3a6" stroke-width="2" marker-end="url(#b)"/>
  <text x="350" y="225" fill="#22d3a6" font-size="11">V flows to the final MatMul</text>
  <line x1="660" y1="194" x2="660" y2="212" stroke="#22d3a6" stroke-width="2" marker-end="url(#b)"/>

  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#e8ecf6"/></marker>
    <marker id="b" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#22d3a6"/></marker>
    <marker id="c" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#ff8a4c"/></marker>
  </defs>
</svg>
