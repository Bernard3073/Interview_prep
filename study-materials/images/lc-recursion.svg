<svg xmlns="http://www.w3.org/2000/svg" width="640" height="320" viewBox="0 0 640 320" font-family="system-ui, sans-serif">
  <rect width="640" height="320" fill="#0f1320"/>
  <text x="20" y="30" fill="#e8ecf6" font-size="16" font-weight="bold">Recursion — factorial(4): descend to the base case, combine back up</text>

  <text x="70"  y="60" fill="#4f8cff" font-size="12">recurse ↓ (push a frame)</text>
  <text x="430" y="60" fill="#22d3a6" font-size="12">return ↑ (combine)</text>

  <!-- descending calls (left) -->
  <g font-size="14" text-anchor="middle">
    <rect x="70" y="76"  width="200" height="34" fill="#1c2236" stroke="#4f8cff"/><text x="170" y="98"  fill="#e8ecf6">fact(4) = 4 · fact(3)</text>
    <rect x="70" y="132" width="200" height="34" fill="#1c2236" stroke="#4f8cff"/><text x="170" y="154" fill="#e8ecf6">fact(3) = 3 · fact(2)</text>
    <rect x="70" y="188" width="200" height="34" fill="#1c2236" stroke="#4f8cff"/><text x="170" y="210" fill="#e8ecf6">fact(2) = 2 · fact(1)</text>
    <rect x="70" y="244" width="200" height="34" fill="#171c2e" stroke="#f5b544"/><text x="170" y="266" fill="#f5b544">fact(1) = 1   (base case)</text>
  </g>
  <!-- down arrows -->
  <g stroke="#2b3350" stroke-width="2">
    <line x1="170" y1="110" x2="170" y2="130" marker-end="url(#d)"/>
    <line x1="170" y1="166" x2="170" y2="186" marker-end="url(#d)"/>
    <line x1="170" y1="222" x2="170" y2="242" marker-end="url(#d)"/>
  </g>

  <!-- returning values (right) -->
  <g font-size="14" text-anchor="middle">
    <rect x="380" y="244" width="180" height="34" fill="#1c2236" stroke="#22d3a6"/><text x="470" y="266" fill="#e8ecf6">1</text>
    <rect x="380" y="188" width="180" height="34" fill="#1c2236" stroke="#22d3a6"/><text x="470" y="210" fill="#e8ecf6">2 · 1 = 2</text>
    <rect x="380" y="132" width="180" height="34" fill="#1c2236" stroke="#22d3a6"/><text x="470" y="154" fill="#e8ecf6">3 · 2 = 6</text>
    <rect x="380" y="76"  width="180" height="34" fill="#1c2236" stroke="#22d3a6"/><text x="470" y="98"  fill="#e8ecf6">4 · 6 = 24</text>
  </g>
  <!-- up arrows -->
  <g stroke="#22d3a6" stroke-width="2" stroke-dasharray="4 3">
    <line x1="470" y1="244" x2="470" y2="224" marker-end="url(#u)"/>
    <line x1="470" y1="188" x2="470" y2="168" marker-end="url(#u)"/>
    <line x1="470" y1="132" x2="470" y2="112" marker-end="url(#u)"/>
  </g>

  <!-- base case handoff -->
  <line x1="270" y1="261" x2="380" y2="261" stroke="#f5b544" stroke-width="2" stroke-dasharray="4 3" marker-end="url(#b)"/>

  <text x="320" y="308" fill="#8892aa" font-size="13" text-anchor="middle">stack depth = 4 frames → O(n) space; one multiply per frame → O(n) time</text>

  <defs>
    <marker id="d" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#4f8cff"/></marker>
    <marker id="u" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#22d3a6"/></marker>
    <marker id="b" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#f5b544"/></marker>
  </defs>
</svg>
