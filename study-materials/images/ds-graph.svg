<svg xmlns="http://www.w3.org/2000/svg" width="640" height="340" viewBox="0 0 640 340" font-family="system-ui, sans-serif">
  <rect width="640" height="340" fill="#0f1320"/>
  <text x="20" y="30" fill="#e8ecf6" font-size="16" font-weight="bold">Graph — two ways to store the same edges</text>

  <!-- graph drawing (compact: max y = 200) -->
  <g stroke="#2b3350" stroke-width="2">
    <line x1="85"  y1="100" x2="215" y2="100"/>
    <line x1="85"  y1="100" x2="150" y2="180"/>
    <line x1="215" y1="100" x2="150" y2="180"/>
    <line x1="150" y1="180" x2="280" y2="180"/>
  </g>
  <g font-size="15" text-anchor="middle">
    <circle cx="85"  cy="100" r="20" fill="#232b44" stroke="#22d3a6" stroke-width="2"/><text x="85"  y="106" fill="#e8ecf6">0</text>
    <circle cx="215" cy="100" r="20" fill="#232b44" stroke="#2b3350"/><text x="215" y="106" fill="#e8ecf6">1</text>
    <circle cx="150" cy="180" r="20" fill="#232b44" stroke="#2b3350"/><text x="150" y="186" fill="#e8ecf6">2</text>
    <circle cx="280" cy="180" r="20" fill="#232b44" stroke="#2b3350"/><text x="280" y="186" fill="#e8ecf6">3</text>
  </g>
  <text x="150" y="72" fill="#9aa6c2" font-size="11" text-anchor="middle">undirected, 4 nodes</text>

  <!-- adjacency list -->
  <text x="350" y="100" fill="#22d3a6" font-size="13" font-weight="bold">Adjacency list · O(V+E)</text>
  <g font-size="13" fill="#e8ecf6" font-family="ui-monospace, monospace">
    <text x="350" y="126">0 → [1, 2]</text>
    <text x="350" y="146">1 → [0, 2]</text>
    <text x="350" y="166">2 → [0, 1, 3]</text>
    <text x="350" y="186">3 → [2]</text>
  </g>

  <!-- adjacency matrix: row label and data in separate left-aligned columns (no overlap) -->
  <text x="525" y="100" fill="#22d3a6" font-size="13" font-weight="bold">Matrix · O(V²)</text>
  <g font-size="13" font-family="ui-monospace, monospace">
    <text x="552" y="126" fill="#9aa6c2">0 1 2 3</text>
    <g fill="#9aa6c2"><text x="527" y="146">0</text><text x="527" y="164">1</text><text x="527" y="182">2</text><text x="527" y="200">3</text></g>
    <g fill="#e8ecf6">
      <text x="552" y="146">0 1 1 0</text>
      <text x="552" y="164">1 0 1 0</text>
      <text x="552" y="182">1 1 0 1</text>
      <text x="552" y="200">0 0 1 0</text>
    </g>
  </g>

  <line x1="20" y1="232" x2="620" y2="232" stroke="#2b3350" stroke-width="1"/>
  <text x="20" y="254" fill="#9aa6c2" font-size="12">Adjacency list O(V+E) — the sparse-friendly default. Matrix O(V²) — O(1) edge test, dense only.</text>
  <text x="20" y="278" fill="#22d3a6" font-size="12">Directed = one-way edges · weighted = cost per edge · DAG = directed + acyclic (topo-sortable).</text>
  <text x="20" y="300" fill="#9aa6c2" font-size="12">Traverse with BFS (queue → shortest hops) or DFS (stack/recursion → paths, cycles, components).</text>
  <text x="20" y="322" fill="#9aa6c2" font-size="12">Python: dict of lists · defaultdict(list)      C++: vector&lt;vector&lt;int&gt;&gt;</text>
</svg>
