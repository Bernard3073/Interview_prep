<svg xmlns="http://www.w3.org/2000/svg" width="640" height="320" viewBox="0 0 640 320" font-family="system-ui, sans-serif">
  <rect width="640" height="320" fill="#0f1320"/>
  <text x="20" y="30" fill="#e8ecf6" font-size="16" font-weight="bold">Divide &amp; conquer — merge sort (split down, merge up)</text>

  <text x="60"  y="60" fill="#4f8cff" font-size="12">divide ↓</text>
  <text x="520" y="60" fill="#22d3a6" font-size="12">combine ↑</text>

  <!-- level 0 -->
  <g font-size="14" text-anchor="middle">
    <rect x="250" y="70" width="140" height="34" fill="#1c2236" stroke="#4f8cff"/><text x="320" y="92" fill="#e8ecf6">8  3  5  1</text>
  </g>
  <!-- split edges -->
  <g stroke="#2b3350" stroke-width="2">
    <line x1="290" y1="104" x2="200" y2="130"/>
    <line x1="350" y1="104" x2="440" y2="130"/>
  </g>
  <!-- level 1 -->
  <g font-size="14" text-anchor="middle">
    <rect x="150" y="130" width="100" height="34" fill="#1c2236" stroke="#4f8cff"/><text x="200" y="152" fill="#e8ecf6">8  3</text>
    <rect x="390" y="130" width="100" height="34" fill="#1c2236" stroke="#4f8cff"/><text x="440" y="152" fill="#e8ecf6">5  1</text>
  </g>
  <g stroke="#2b3350" stroke-width="2">
    <line x1="180" y1="164" x2="150" y2="190"/>
    <line x1="220" y1="164" x2="250" y2="190"/>
    <line x1="420" y1="164" x2="390" y2="190"/>
    <line x1="460" y1="164" x2="490" y2="190"/>
  </g>
  <!-- level 2 (singletons) -->
  <g font-size="14" text-anchor="middle">
    <rect x="126" y="190" width="48" height="34" fill="#171c2e" stroke="#2b3350"/><text x="150" y="212" fill="#e8ecf6">8</text>
    <rect x="226" y="190" width="48" height="34" fill="#171c2e" stroke="#2b3350"/><text x="250" y="212" fill="#e8ecf6">3</text>
    <rect x="366" y="190" width="48" height="34" fill="#171c2e" stroke="#2b3350"/><text x="390" y="212" fill="#e8ecf6">5</text>
    <rect x="466" y="190" width="48" height="34" fill="#171c2e" stroke="#2b3350"/><text x="490" y="212" fill="#e8ecf6">1</text>
  </g>

  <!-- merge up -->
  <g stroke="#22d3a6" stroke-width="2" stroke-dasharray="4 3">
    <line x1="150" y1="190" x2="180" y2="252"/>
    <line x1="250" y1="190" x2="220" y2="252"/>
    <line x1="390" y1="190" x2="420" y2="252"/>
    <line x1="490" y1="190" x2="460" y2="252"/>
  </g>
  <g font-size="14" text-anchor="middle">
    <rect x="150" y="252" width="100" height="34" fill="#1c2236" stroke="#22d3a6"/><text x="200" y="274" fill="#e8ecf6">3  8</text>
    <rect x="390" y="252" width="100" height="34" fill="#1c2236" stroke="#22d3a6"/><text x="440" y="274" fill="#e8ecf6">1  5</text>
  </g>
  <g stroke="#22d3a6" stroke-width="2" stroke-dasharray="4 3">
    <line x1="210" y1="252" x2="300" y2="296"/>
    <line x1="430" y1="252" x2="340" y2="296"/>
  </g>
  <text x="320" y="312" fill="#22d3a6" font-size="14" text-anchor="middle" font-weight="bold">1  3  5  8   (merge two sorted halves: O(n) per level × log n levels)</text>
</svg>
