<svg xmlns="http://www.w3.org/2000/svg" width="760" height="340" viewBox="0 0 760 340" font-family="system-ui, sans-serif">
  <rect width="760" height="340" fill="#0f1320"/>
  <text x="20" y="30" fill="#e8ecf6" font-size="16" font-weight="bold">Self-Attention vs. Cross-Attention</text>
  <text x="20" y="52" fill="#9aa6c2" font-size="12">Difference is only where Q, K, V come from.</text>

  <!-- divider -->
  <line x1="380" y1="70" x2="380" y2="330" stroke="#2a3350" stroke-width="1.5" stroke-dasharray="5 5"/>

  <!-- ===== SELF ===== -->
  <text x="190" y="92" fill="#4f8cff" font-size="14" text-anchor="middle" font-weight="bold">Self-attention</text>
  <text x="190" y="112" fill="#9aa6c2" font-size="11" text-anchor="middle">Q, K, V all from ONE sequence</text>

  <rect x="120" y="130" width="140" height="40" rx="8" fill="#1c2236" stroke="#4f8cff" stroke-width="2"/>
  <text x="190" y="155" fill="#e8ecf6" font-size="12" text-anchor="middle">Sequence X (tokens)</text>

  <rect x="70" y="210" width="64" height="32" rx="6" fill="#1c2236" stroke="#4f8cff" stroke-width="1.5"/>
  <text x="102" y="231" fill="#4f8cff" font-size="12" text-anchor="middle">Q</text>
  <rect x="158" y="210" width="64" height="32" rx="6" fill="#1c2236" stroke="#4f8cff" stroke-width="1.5"/>
  <text x="190" y="231" fill="#4f8cff" font-size="12" text-anchor="middle">K</text>
  <rect x="246" y="210" width="64" height="32" rx="6" fill="#1c2236" stroke="#22d3a6" stroke-width="1.5"/>
  <text x="278" y="231" fill="#22d3a6" font-size="12" text-anchor="middle">V</text>

  <line x1="170" y1="170" x2="110" y2="208" stroke="#e8ecf6" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="190" y1="170" x2="190" y2="208" stroke="#e8ecf6" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="210" y1="170" x2="270" y2="208" stroke="#e8ecf6" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="120" y="278" width="140" height="36" rx="8" fill="#1c2236" stroke="#ff8a4c" stroke-width="2"/>
  <text x="190" y="301" fill="#ff8a4c" font-size="12" text-anchor="middle">Attention(Q,K,V)</text>
  <line x1="102" y1="242" x2="160" y2="276" stroke="#e8ecf6" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="190" y1="242" x2="190" y2="276" stroke="#e8ecf6" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="278" y1="242" x2="220" y2="276" stroke="#e8ecf6" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="190" y="332" fill="#9aa6c2" font-size="10" text-anchor="middle">each token attends to every other token</text>

  <!-- ===== CROSS ===== -->
  <text x="570" y="92" fill="#22d3a6" font-size="14" text-anchor="middle" font-weight="bold">Cross-attention</text>
  <text x="570" y="112" fill="#9aa6c2" font-size="11" text-anchor="middle">Q from A, K/V from B (BEV ↔ image)</text>

  <rect x="430" y="130" width="120" height="40" rx="8" fill="#1c2236" stroke="#4f8cff" stroke-width="2"/>
  <text x="490" y="148" fill="#e8ecf6" font-size="11" text-anchor="middle">Seq A</text>
  <text x="490" y="163" fill="#9aa6c2" font-size="10" text-anchor="middle">BEV queries</text>
  <rect x="600" y="130" width="120" height="40" rx="8" fill="#1c2236" stroke="#22d3a6" stroke-width="2"/>
  <text x="660" y="148" fill="#e8ecf6" font-size="11" text-anchor="middle">Seq B</text>
  <text x="660" y="163" fill="#9aa6c2" font-size="10" text-anchor="middle">image features</text>

  <rect x="458" y="210" width="64" height="32" rx="6" fill="#1c2236" stroke="#4f8cff" stroke-width="1.5"/>
  <text x="490" y="231" fill="#4f8cff" font-size="12" text-anchor="middle">Q</text>
  <rect x="558" y="210" width="64" height="32" rx="6" fill="#1c2236" stroke="#22d3a6" stroke-width="1.5"/>
  <text x="590" y="231" fill="#22d3a6" font-size="12" text-anchor="middle">K</text>
  <rect x="646" y="210" width="64" height="32" rx="6" fill="#1c2236" stroke="#22d3a6" stroke-width="1.5"/>
  <text x="678" y="231" fill="#22d3a6" font-size="12" text-anchor="middle">V</text>

  <line x1="490" y1="170" x2="490" y2="208" stroke="#4f8cff" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="650" y1="170" x2="600" y2="208" stroke="#22d3a6" stroke-width="1.5" marker-end="url(#b)"/>
  <line x1="670" y1="170" x2="685" y2="208" stroke="#22d3a6" stroke-width="1.5" marker-end="url(#b)"/>

  <rect x="500" y="278" width="140" height="36" rx="8" fill="#1c2236" stroke="#ff8a4c" stroke-width="2"/>
  <text x="570" y="301" fill="#ff8a4c" font-size="12" text-anchor="middle">Attention(Q,K,V)</text>
  <line x1="490" y1="242" x2="540" y2="276" stroke="#e8ecf6" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="590" y1="242" x2="580" y2="276" stroke="#e8ecf6" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="678" y1="242" x2="610" y2="276" stroke="#e8ecf6" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="570" y="332" fill="#9aa6c2" font-size="10" text-anchor="middle">queries pull info from a different source</text>

  <defs>
    <marker id="a" markerWidth="8" markerHeight="8" refX="5.5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#e8ecf6"/></marker>
    <marker id="b" markerWidth="8" markerHeight="8" refX="5.5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#22d3a6"/></marker>
  </defs>
</svg>
