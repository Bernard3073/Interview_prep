<svg xmlns="http://www.w3.org/2000/svg" width="660" height="300" viewBox="0 0 660 300" font-family="system-ui, sans-serif">
  <rect width="660" height="300" fill="#0f1320"/>
  <text x="20" y="28" fill="#e8ecf6" font-size="16" font-weight="bold">Kalman Filter — Predict / Update Loop</text>
  <!-- predict box -->
  <rect x="60" y="80" width="220" height="120" rx="12" fill="#1c2236" stroke="#4f8cff" stroke-width="2"/>
  <text x="170" y="108" fill="#4f8cff" font-size="15" text-anchor="middle" font-weight="bold">PREDICT</text>
  <text x="170" y="138" fill="#e8ecf6" font-size="13" text-anchor="middle">x⁻ = F x + B u</text>
  <text x="170" y="162" fill="#e8ecf6" font-size="13" text-anchor="middle">P⁻ = F P Fᵀ + Q</text>
  <text x="170" y="190" fill="#9aa6c2" font-size="11" text-anchor="middle">(motion model)</text>
  <!-- update box -->
  <rect x="380" y="80" width="220" height="120" rx="12" fill="#1c2236" stroke="#22d3a6" stroke-width="2"/>
  <text x="490" y="108" fill="#22d3a6" font-size="15" text-anchor="middle" font-weight="bold">UPDATE</text>
  <text x="490" y="134" fill="#e8ecf6" font-size="12" text-anchor="middle">K = P⁻Hᵀ(H P⁻Hᵀ+R)⁻¹</text>
  <text x="490" y="156" fill="#e8ecf6" font-size="12" text-anchor="middle">x = x⁻ + K(z − H x⁻)</text>
  <text x="490" y="178" fill="#e8ecf6" font-size="12" text-anchor="middle">P = (I − K H) P⁻</text>
  <text x="490" y="195" fill="#9aa6c2" font-size="11" text-anchor="middle">(measurement)</text>
  <!-- arrows -->
  <line x1="280" y1="140" x2="375" y2="140" stroke="#e8ecf6" stroke-width="2" marker-end="url(#a)"/>
  <path d="M490 200 C 490 250, 170 250, 170 205" fill="none" stroke="#e8ecf6" stroke-width="2" marker-end="url(#a)"/>
  <text x="330" y="132" fill="#9aa6c2" font-size="11">x⁻,P⁻</text>
  <text x="320" y="265" fill="#9aa6c2" font-size="11">next step</text>
  <text x="300" y="60" fill="#ff8a4c" font-size="12">z (sensor)</text>
  <line x1="490" y1="65" x2="490" y2="78" stroke="#ff8a4c" stroke-width="2" marker-end="url(#b)"/>
  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#e8ecf6"/></marker>
    <marker id="b" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#ff8a4c"/></marker>
  </defs>
</svg>
